<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKING SEO & GEO 海报生成器</title>
    <style>
        :root {
            --accent: #ff5fa8;
            --accent-soft: #ec9bc1;
            --text: #fffafc;
            --muted: #9d97ad;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px 20px 60px;
            background:
                radial-gradient(circle at 50% 8%, rgba(255, 95, 168, 0.12), transparent 22%),
                radial-gradient(circle at 50% 80%, rgba(115, 34, 87, 0.42), transparent 36%),
                linear-gradient(180deg, #030108 0%, #07030d 52%, #04020a 100%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .controls {
            margin-bottom: 28px;
            display: flex;
            gap: 15px;
        }

        button {
            appearance: none;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02)),
                linear-gradient(135deg, #ee62aa, #892965);
            color: white;
            padding: 13px 24px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            box-shadow:
                0 12px 34px rgba(201, 82, 147, 0.22),
                inset 0 1px 0 rgba(255,255,255,0.18);
            transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow:
                0 16px 42px rgba(201, 82, 147, 0.34),
                inset 0 1px 0 rgba(255,255,255,0.24);
        }

        .canvas-container {
            position: relative;
            max-width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05),
                0 30px 90px rgba(0, 0, 0, 0.55),
                0 0 80px rgba(201, 82, 147, 0.12);
        }

        .canvas-container::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 11%, transparent 88%, rgba(255,255,255,0.03));
            mix-blend-mode: screen;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 900px;
            height: auto;
            background: #090611;
        }

        @media (max-width: 940px) {
            canvas {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="downloadBtn">下载高清海报 (PNG)</button>
    </div>

    <div class="canvas-container">
        <canvas id="posterCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('posterCanvas');
        const ctx = canvas.getContext('2d');

        const POSTER_WIDTH = 1000;
        const POSTER_HEIGHT = 1550;

        const COLORS = {
            accent: '#ff5fa8',
            accentSoft: '#e8a9c8',
            accentGlow: 'rgba(255,95,168,0.18)',
            burgundy: '#7a183f',
            burgundyGlow: 'rgba(122,24,63,0.28)',
            textMain: '#fffafc',
            textMuted: '#9d97ad',
            textSoft: '#cbc6d8',
            line: 'rgba(255,255,255,0.08)',
            lineSoft: 'rgba(255,255,255,0.045)'
        };

        const FONT_DISPLAY = '"Canela", "Iowan Old Style", "Baskerville", "Times New Roman", serif';
        const FONT_HEADLINE = '"SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';
        const FONT_SANS = '"PingFang SC", "SF Pro Text", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif';
        const FONT_META = '"SF Mono", "JetBrains Mono", "Menlo", monospace';

        let noiseTextureCanvas = null;

        function buildRoundedRectPath(pathContext, x, y, w, h, radius) {
            pathContext.beginPath();
            if (pathContext.roundRect) {
                pathContext.roundRect(x, y, w, h, radius);
                return;
            }

            pathContext.moveTo(x + radius, y);
            pathContext.arcTo(x + w, y, x + w, y + h, radius);
            pathContext.arcTo(x + w, y + h, x, y + h, radius);
            pathContext.arcTo(x, y + h, x, y, radius);
            pathContext.arcTo(x, y, x + w, y, radius);
            pathContext.closePath();
        }

        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = POSTER_WIDTH * dpr;
            canvas.height = POSTER_HEIGHT * dpr;
            canvas.style.width = POSTER_WIDTH + 'px';
            canvas.style.height = POSTER_HEIGHT + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, POSTER_WIDTH, POSTER_HEIGHT);
            ctx.textBaseline = 'top';
        }

        function drawTextWrap(text, x, y, maxWidth, lineHeight, font, color, align = 'left') {
            ctx.save();
            ctx.font = font;
            ctx.fillStyle = color;
            ctx.textAlign = align;

            const lines = text.split('\n');
            let currentY = y;

            for (const rawLine of lines) {
                let line = '';
                const chars = rawLine.split('');

                for (let i = 0; i < chars.length; i++) {
                    const testLine = line + chars[i];
                    const testWidth = ctx.measureText(testLine).width;

                    if (testWidth > maxWidth && i > 0) {
                        const drawX = align === 'center' ? x + maxWidth / 2 : x;
                        ctx.fillText(line, drawX, currentY);
                        line = chars[i];
                        currentY += lineHeight;
                    } else {
                        line = testLine;
                    }
                }

                const drawX = align === 'center' ? x + maxWidth / 2 : x;
                ctx.fillText(line, drawX, currentY);
                currentY += lineHeight;
            }

            ctx.restore();
            return currentY;
        }

        function drawRoundRect(x, y, w, h, radius, fillStyle, strokeStyle, lineWidth = 1) {
            buildRoundedRectPath(ctx, x, y, w, h, radius);

            if (fillStyle) {
                ctx.fillStyle = fillStyle;
                ctx.fill();
            }
            if (strokeStyle) {
                ctx.lineWidth = lineWidth;
                ctx.strokeStyle = strokeStyle;
                ctx.stroke();
            }
        }

        function getNoiseTexture() {
            if (noiseTextureCanvas) {
                return noiseTextureCanvas;
            }

            noiseTextureCanvas = document.createElement('canvas');
            noiseTextureCanvas.width = POSTER_WIDTH;
            noiseTextureCanvas.height = POSTER_HEIGHT;
            const noiseCtx = noiseTextureCanvas.getContext('2d');
            const imageData = noiseCtx.createImageData(POSTER_WIDTH, POSTER_HEIGHT);
            const buffer = imageData.data;

            for (let i = 0; i < buffer.length; i += 4) {
                const value = Math.random() * 255;
                buffer[i] = value;
                buffer[i + 1] = value;
                buffer[i + 2] = value;
                buffer[i + 3] = 255;
            }

            noiseCtx.putImageData(imageData, 0, 0);
            return noiseTextureCanvas;
        }

        function drawNoise(opacity = 0.038) {
            ctx.save();
            ctx.globalAlpha = opacity;
            ctx.drawImage(getNoiseTexture(), 0, 0);
            ctx.restore();
        }

        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = 'rgba(255,255,255,0.026)';
            ctx.lineWidth = 1;
            for (let i = 0; i < POSTER_WIDTH; i += 56) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, POSTER_HEIGHT);
                ctx.stroke();
            }
            for (let i = 0; i < POSTER_HEIGHT; i += 56) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(POSTER_WIDTH, i);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawDecorativeArcs() {
            ctx.save();
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(770, 330, 210, Math.PI * 1.06, Math.PI * 1.82);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(770, 330, 240, Math.PI * 1.08, Math.PI * 1.8);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255,95,168,0.14)';
            ctx.beginPath();
            ctx.arc(770, 330, 195, Math.PI * 1.12, Math.PI * 1.74);
            ctx.stroke();
            ctx.restore();
        }

        function drawBackground() {
            const base = ctx.createLinearGradient(0, 0, 0, POSTER_HEIGHT);
            base.addColorStop(0, '#030108');
            base.addColorStop(0.52, '#08040f');
            base.addColorStop(1, '#04020a');
            ctx.fillStyle = base;
            ctx.fillRect(0, 0, POSTER_WIDTH, POSTER_HEIGHT);

            const topGlow = ctx.createRadialGradient(500, 150, 0, 500, 150, 340);
            topGlow.addColorStop(0, 'rgba(255, 109, 176, 0.17)');
            topGlow.addColorStop(0.56, 'rgba(173, 56, 115, 0.08)');
            topGlow.addColorStop(1, 'rgba(255, 109, 176, 0)');
            ctx.fillStyle = topGlow;
            ctx.fillRect(0, 0, POSTER_WIDTH, 460);

            const sideGlow = ctx.createRadialGradient(930, 260, 0, 930, 260, 300);
            sideGlow.addColorStop(0, 'rgba(255,95,168,0.08)');
            sideGlow.addColorStop(1, 'rgba(255,95,168,0)');
            ctx.fillStyle = sideGlow;
            ctx.fillRect(620, 0, 380, 520);

            const bottomGlow = ctx.createRadialGradient(500, 1360, 120, 500, 1360, 780);
            bottomGlow.addColorStop(0, 'rgba(109, 31, 80, 0.46)');
            bottomGlow.addColorStop(0.45, 'rgba(109, 31, 80, 0.16)');
            bottomGlow.addColorStop(1, 'rgba(109, 31, 80, 0)');
            ctx.fillStyle = bottomGlow;
            ctx.fillRect(0, 760, POSTER_WIDTH, POSTER_HEIGHT - 760);

            const vignette = ctx.createRadialGradient(500, 720, 400, 500, 720, 950);
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, 'rgba(0,0,0,0.46)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, POSTER_WIDTH, POSTER_HEIGHT);

            drawGrid();
            drawDecorativeArcs();
            drawNoise();
            drawRoundRect(26, 26, POSTER_WIDTH - 52, POSTER_HEIGHT - 52, 24, null, 'rgba(255,255,255,0.05)');
        }

        function drawTopLabel(x, y, width) {
            drawRoundRect(x, y, width, 34, 999, 'rgba(255,255,255,0.04)', 'rgba(255,255,255,0.07)');
            ctx.fillStyle = COLORS.accentSoft;
            ctx.font = `600 13px ${FONT_META}`;
            ctx.fillText('GROWTH HACKING LAB', x + 20, y + 9);
        }

        function drawSideMeta() {
            ctx.save();
            ctx.translate(944, 176);
            ctx.rotate(Math.PI / 2);
            ctx.fillStyle = 'rgba(255,255,255,0.22)';
            ctx.font = `500 11px ${FONT_META}`;
            ctx.fillText('STRATEGY / AUTHORITY / SEARCH VISIBILITY / AI CITATION', 0, 0);
            ctx.restore();
        }

        function drawHeroHighlight(x, y, w, h) {
            const gradient = ctx.createLinearGradient(x, y, x + w, y + h);
            gradient.addColorStop(0, 'rgba(255,255,255,0.045)');
            gradient.addColorStop(0.55, 'rgba(255,95,168,0.10)');
            gradient.addColorStop(1, 'rgba(255,255,255,0.02)');
            drawRoundRect(x, y, w, h, 20, gradient, 'rgba(255,255,255,0.11)');
        }

        function drawFormulaBlock(x, y, w, h) {
            const formulaText = '现代 SEO = 技术 × 品牌 × (内容 + 外链 + 用户交互) × 程序化 SEO';
            const centerX = x + w / 2;
            const mainY = y + 28;

            drawHeroHighlight(x, y, w, h);

            ctx.save();
            ctx.textAlign = 'center';
            ctx.font = `600 25px ${FONT_HEADLINE}`;

            ctx.fillStyle = 'rgba(8, 5, 12, 0.34)';
            ctx.fillText(formulaText, centerX, mainY + 7);

            ctx.shadowColor = 'rgba(255,255,255,0.16)';
            ctx.shadowBlur = 10;
            ctx.fillStyle = COLORS.textMain;
            ctx.fillText(formulaText, centerX, mainY);
            ctx.shadowBlur = 0;

            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.fillText(formulaText, centerX, mainY + 1);
            ctx.restore();
        }

        function drawCard(x, y, w, h, index, title, desc) {
            ctx.save();
            ctx.shadowColor = 'rgba(255, 95, 168, 0.12)';
            ctx.shadowBlur = 30;
            ctx.shadowOffsetY = 16;
            drawRoundRect(x, y, w, h, 22, 'rgba(255,255,255,0.038)', 'rgba(255,255,255,0.1)');
            ctx.restore();

            const innerGlow = ctx.createLinearGradient(x, y, x + w, y + h);
            innerGlow.addColorStop(0, 'rgba(255,255,255,0.032)');
            innerGlow.addColorStop(1, 'rgba(255,95,168,0.018)');
            drawRoundRect(x + 1, y + 1, w - 2, h - 2, 21, innerGlow, null);

            drawRoundRect(x + 18, y + 18, 4, h - 36, 4, 'rgba(255,95,168,0.95)', null);

            ctx.fillStyle = 'rgba(255,255,255,0.22)';
            ctx.font = `500 13px ${FONT_META}`;
            ctx.fillText(`0${index}`, x + 38, y + 28);

            drawTextWrap(title, x + 38, y + 56, w - 76, 34, `600 24px ${FONT_HEADLINE}`, 'rgba(255, 250, 252, 0.96)');

            ctx.fillStyle = 'rgba(255,95,168,0.7)';
            ctx.fillRect(x + 38, y + 112, 54, 2);

            drawTextWrap(desc, x + 38, y + 136, w - 76, 31, `400 19px ${FONT_SANS}`, COLORS.textMuted);
        }

        function drawAlertBlock(x, y, w, h) {
            const fill = ctx.createLinearGradient(x, y, x + w, y + h);
            fill.addColorStop(0, 'rgba(31, 18, 30, 0.94)');
            fill.addColorStop(1, 'rgba(48, 24, 41, 0.78)');
            drawRoundRect(x, y, w, h, 24, fill, 'rgba(255,255,255,0.1)');

            ctx.save();
            buildRoundedRectPath(ctx, x, y, w, h, 24);
            ctx.clip();
            ctx.strokeStyle = 'rgba(255,255,255,0.045)';
            for (let i = -40; i < 220; i += 16) {
                ctx.beginPath();
                ctx.moveTo(x + i, y);
                ctx.lineTo(x + i - 90, y + h);
                ctx.stroke();
            }
            ctx.restore();

            ctx.fillStyle = COLORS.accent;
            ctx.fillRect(x + 34, y + 36, 12, 12);
            ctx.fillRect(x + 52, y + 36, 12, 12);
            ctx.fillRect(x + 34, y + 54, 12, 12);

            ctx.fillStyle = COLORS.textMain;
            ctx.font = `700 25px ${FONT_SANS}`;
            ctx.fillText('一整年的落地 SOP 与规划文档', x + 88, y + 30);

            drawTextWrap(
                '结合 SEMrush 深度数据，为客户交付高价值的挖词推荐表，以及细化到一年的 SEO 落地执行清单，团队可直接跟进推进，绝不纸上谈兵。',
                x + 88,
                y + 78,
                w - 126,
                32,
                `400 19px ${FONT_SANS}`,
                COLORS.textSoft
            );
        }

        function drawFooterTag(x, y) {
            drawRoundRect(x, y, 246, 32, 999, 'rgba(255,255,255,0.03)', 'rgba(255,255,255,0.07)');
            ctx.fillStyle = 'rgba(255,255,255,0.22)';
            ctx.font = `500 11px ${FONT_META}`;
            ctx.fillText('SEO / GEO / AUTHORITY / VISIBILITY', x + 18, y + 8);
        }

        function downloadCanvas() {
            canvas.toBlob((blob) => {
                if (!blob) {
                    return;
                }

                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = 'Hacking_SEO_GEO_Poster_Premium.png';
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        function renderPoster() {
            drawBackground();
            drawSideMeta();

            const paddingX = 82;
            let currentY = 84;

            drawTopLabel(paddingX, currentY, 238);
            currentY += 72;

            ctx.fillStyle = COLORS.textMain;
            ctx.font = `900 78px ${FONT_DISPLAY}`;
            ctx.shadowColor = COLORS.accentGlow;
            ctx.shadowBlur = 24;
            ctx.fillText('HACKING', paddingX, currentY);
            ctx.fillText('SEO & GEO', paddingX, currentY + 84);
            ctx.shadowBlur = 0;

            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.font = `500 11px ${FONT_META}`;
            ctx.fillText('01 / PREMIUM GROWTH POSTER', paddingX + 2, currentY + 184);
            currentY += 224;

            currentY = drawTextWrap(
                '你的竞争对手，正在同时吃掉 Google 与 AI 的答案流量！',
                paddingX,
                currentY,
                POSTER_WIDTH - paddingX * 2 - 40,
                42,
                `600 31px ${FONT_SANS}`,
                COLORS.textMain
            );
            currentY += 18;

            currentY = drawTextWrap(
                '把 SEO 的不确定性，用技术手段变成增长的确定性。\n我们不只是服务商，我们直接交付 SEO 与 GEO 的真实流量结果。',
                paddingX,
                currentY,
                POSTER_WIDTH - paddingX * 2 - 52,
                35,
                `500 21px ${FONT_HEADLINE}`,
                'rgba(218, 213, 228, 0.82)'
            );
            currentY += 42;

            drawFormulaBlock(paddingX, currentY, POSTER_WIDTH - paddingX * 2, 92);
            currentY += 134;

            const cards = [
                {
                    title: '流量霸屏与大模型占位',
                    desc: '通过 PSEO 策略快速覆盖长尾词和高竞争词的 Google 首页；同时优化品牌在 AI 搜索引擎中的引用率。'
                },
                {
                    title: '全视角竞对攻防',
                    desc: '综合运用白帽、灰帽、黑帽策略，制定针对核心竞品的流量抢夺方案，并提供对应的落地服务。'
                },
                {
                    title: 'GEO 洞见报告输出',
                    desc: '分析竞品在 ChatGPT、Perplexity 等的提及率与情感倾向。生成洞见：你的内容缺哪些元素导致 AI 不引用你。'
                },
                {
                    title: '万字级定制增长策略',
                    desc: '提供全套解决方案：寄生站引流、搭建高转化内站博客、底层技术 SEO 审计，以及高权重外链建设。'
                }
            ];

            const gap = 28;
            const cardWidth = (POSTER_WIDTH - paddingX * 2 - gap) / 2;
            const cardHeight = 244;
            const cardRows = Math.ceil(cards.length / 2);

            cards.forEach((card, index) => {
                const row = Math.floor(index / 2);
                const col = index % 2;
                const x = paddingX + col * (cardWidth + gap);
                const y = currentY + row * (cardHeight + gap);
                drawCard(x, y, cardWidth, cardHeight, index + 1, card.title, card.desc);
            });

            currentY += cardRows * cardHeight + (cardRows - 1) * gap + 58;

            drawAlertBlock(paddingX, currentY, POSTER_WIDTH - paddingX * 2, 170);
            currentY += 232;

            ctx.strokeStyle = COLORS.line;
            ctx.beginPath();
            ctx.moveTo(paddingX, currentY);
            ctx.lineTo(POSTER_WIDTH - paddingX, currentY);
            ctx.stroke();
            currentY += 36;

            ctx.font = `900 46px ${FONT_DISPLAY}`;
            ctx.fillStyle = COLORS.textMain;
            ctx.fillText('THANK', paddingX, currentY);
            ctx.fillStyle = COLORS.accent;
            ctx.fillText('YOU.', paddingX + 182, currentY);

            ctx.fillStyle = COLORS.textMuted;
            ctx.font = `400 19px ${FONT_SANS}`;
            ctx.fillText('Any questions? 适者生存，现在就抢占 AI 时代的可见性！', paddingX, currentY + 62);

            drawFooterTag(paddingX, POSTER_HEIGHT - 98);
        }

        document.getElementById('downloadBtn').addEventListener('click', downloadCanvas);

        window.onload = () => {
            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(() => {
                    initCanvas();
                    renderPoster();
                });
            } else {
                initCanvas();
                renderPoster();
            }
        };
    </script>
</body>
</html>
